<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="w-screen h-screen flex items-center justify-center bg-cover bg-center overflow-hidden
bg-[url('https://images.unsplash.com/photo-1603437873662-dc1f44901825?w=900')]">

<div id="card" class="backdrop-blur-lg rounded-3xl shadow-2xl p-6 w-[380px] text-center flex flex-col gap-6">



<nav class="flex items-center gap-3">

<i class="fa-solid fa-bars-staggered text-white text-xl"></i>

<input id="city"
type="text"
placeholder="Enter city..."
class="flex-1 px-3 py-2 rounded-lg bg-white/40 text-white placeholder-white outline-none">

<button onclick="getWeather()"
class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-white font-semibold">
Search </button>

</nav>



<main class="flex flex-col items-center text-white gap-2">

<p id="icon" class="text-[80px]"></p>

<p id="temp" class="text-4xl font-bold"></p>

<p id="update" class="text-lg font-bold"></p>

<p id="day" class="text-blue-700 font-bold text-lg"></p>

</main>



<div class="flex justify-between gap-4 text-white">

<div class="bg-white/20 rounded-xl p-4 flex-1 text-center">
<i class="fa-solid fa-wind text-xl mb-2"></i>
<p id="wind" class="font-bold"></p>
</div>

<div class="bg-white/20 rounded-xl p-4 flex-1 text-center">
<i class="fa-solid fa-gauge-high text-xl mb-2"></i>
<p class="font-bold" id="pressure"></p>
</div>

</div>

</div>

<script src="weather.js"></script>

</body>
</html>
